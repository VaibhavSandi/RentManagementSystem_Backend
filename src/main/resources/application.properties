spring.application.name=rent-management-api

server.port=8080

# # SQL Server Database
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=RentManagementDB;encrypt=true;trustServerCertificate=true
# spring.datasource.username=ats-india
# spring.datasource.password=Ats123*
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver



spring.datasource.url=jdbc:postgresql://localhost:5432/rent_management_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver



spring.security.user.name=admin
spring.security.user.password=admin123

server.forward-headers-strategy=framework

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL Server Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



springdoc.swagger-ui.path=/swagger-ui.html

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
